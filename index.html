*{box-sizing:border-box;margin:0;padding:0}
:root{

body,#app{font-family:var(--ui);background:#fff;color:var(--txt)}

.hdr{background:var(--g1);padding:14px 16px 0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center}

.lang-toggle{display:flex;background:rgba(255,255,255,0.15);border-radius:20px;padding:3px;gap:2px}
.lang-btn{padding:4px 10px;border-radius:16px;border:none;font-family:var(--ui);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;color:rgba(255,255,255,0.7);background:transparent}
.lang-btn.active{background:#fff;color:var(--g1)}

.live-bar{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#ff4444;animation:blink 1.2s infinite}

.live-txt{font-size:11px;color:rgba(255,255,255,0.8);font-family:var(--mono);letter-spacing:1px}

.date-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}

.date-chip{flex:0 0 auto;padding:6px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;text-align:center;min-width:52px}
.date-chip.active{background:#fff;border-color:#fff;color:var(--g1);font-weight:600}
.date-chip:hover:not(.active){background:rgba(255,255,255,0.1)}
.date-chip .dc-day{font-size:10px;display:block;opacity:.8}

.main{padding:14px 14px 20px}

.section-hdr{display:flex;align-items:center;gap:8px;margin:14px 0 10px;font-size:12px;font-weight:600;color:var(--txt2);letter-spacing:1px;text-transform:uppercase}
.section-hdr i{color:var(--g2);font-size:14px}
.section-hdr::after{content:'';flex:1;height:1px;background:var(--bdr)}

.match-card{background:var(--wht);border:1px solid var(--bdr);border-radius:14px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.match-card:hover{border-color:var(--g2)}
.match-card.active{border-color:var(--g2);border-width:1.5px}
.mc-top{padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.mc-league{font-size:10px;font-weight:600;color:var(--g2);letter-spacing:1px;text-transform:uppercase;background:var(--g4);padding:3px 8px;border-radius:4px}
.mc-time{font-family:var(--mono);font-size:11px;color:var(--txt3)}
.mc-time.live-t{color:var(--red);font-weight:600}
.mc-body{padding:8px 14px 12px;display:flex;align-items:center;gap:8px}
.mc-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.mc-team-name{font-size:13px;font-weight:600;color:var(--txt);text-align:center}
.mc-team-form{display:flex;gap:2px}

.ff.D{background:#fef3dc;color:#b7750a}
.ff.L{background:#fde8e8;color:#b91c1c}

.mc-vs{font-size:11px;color:var(--txt3);letter-spacing:1px}
.mc-live-ind{font-size:10px;color:var(--red);font-family:var(--mono)}
.mc-footer{background:var(--sfc);border-top:1px solid var(--bdr);padding:7px 14px;display:flex;align-items:center;justify-content:space-between}
.mc-odds{display:flex;gap:6px}
.odd-chip{font-family:var(--mono);font-size:11px;color:var(--txt2);background:#fff;border:1px solid var(--bdr);border-radius:5px;padding:2px 7px}
.mc-ai-badge{font-size:10px;font-weight:600;color:var(--g1);background:var(--g4);border:1px solid var(--bdr2);border-radius:10px;padding:2px 8px;display:flex;align-items:center;gap:4px}

.detail-panel{background:var(--sfc);border:1.5px solid var(--g2);border-radius:14px;margin-bottom:10px;overflow:hidden}
.dtabs{display:flex;border-bottom:1px solid var(--bdr);background:#fff}

.dtab.active{color:var(--g1);border-bottom-color:var(--g1);font-weight:600}
.dp-body{padding:14px}

.oracle-title{font-size:13px;font-weight:700;color:var(--g1);display:flex;align-items:center;gap:6px;margin-bottom:4px}

.conf-badge{display:inline-flex;align-items:center;gap:5px;background:var(--g4);border:1px solid var(--bdr2);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--g1);margin-bottom:14px}

.prob-track{height:44px;border-radius:10px;overflow:hidden;display:flex;margin-bottom:8px}
.prob-seg{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;transition:flex 1.2s}
.prob-seg.ph{background:#1a7a3c;color:#fff;border-radius:10px 0 0 10px}
.prob-seg.pd{background:#d4a017;color:#fff}
.prob-seg.pa{background:#c0392b;color:#fff;border-radius:0 10px 10px 0}
.prob-lbls{display:flex;justify-content:space-between;margin-bottom:14px}
.pl{text-align:center;font-size:11px;color:var(--txt3)}
.pl-pct{font-size:17px;font-weight:700;display:block}
.pl.ph .pl-pct{color:var(--g1)}
.pl.pd .pl-pct{color:#b7750a}
.pl.pa .pl-pct{color:var(--red)}

.analysis-box{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:12px;margin-bottom:12px}
.analysis-lbl{font-size:10px;font-weight:600;color:var(--g2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.analysis-txt{font-size:12px;color:var(--txt2);line-height:1.65}
.analysis-txt strong{color:var(--txt);font-weight:600}

.models-row{display:flex;flex-wrap:wrap;gap:6px}
.model-chip{display:flex;align-items:center;gap:4px;background:#fff;border:1px solid var(--bdr);border-radius:7px;padding:4px 8px;font-size:10px;color:var(--txt2)}

.vote-H{background:#dcfbec;color:#1a7a3c}
.vote-D{background:#fef3dc;color:#b7750a}
.vote-A{background:#fde8e8;color:#b91c1c}

.form-lbl{font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:4px}
.form-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.form-name{font-size:12px;font-weight:600;color:var(--txt);min-width:60px}
.form-dots{display:flex;gap:3px}

.pts-lbl{font-family:var(--mono);font-size:10px;color:var(--txt3);min-width:28px;text-align:right}

.stat-r{display:flex;align-items:center;gap:6px;margin-bottom:7px}

.stat-section-title{font-size:11px;font-weight:600;color:var(--txt2);margin:10px 0 6px;padding-top:10px;border-top:1px solid var(--bdr)}

.inj-item.high{background:#fdf4f4;border-color:var(--red)}
.inj-item.med{background:#fefbf0;border-color:var(--amber)}
.inj-item.low{background:var(--sfc);border-color:var(--bdr2)}

.inj-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;font-family:var(--mono)}

.inj-badge.med{background:#fef3dc;color:#b7750a}
.inj-badge.low{background:var(--g4);color:var(--g1)}
.inj-section{font-size:11px;font-weight:600;color:var(--txt2);margin:10px 0 6px;padding-top:10px;border-top:1px solid var(--bdr)}

.player-r{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--bdr)}

.pl-num{font-family:var(--mono);font-size:11px;color:var(--txt3);min-width:22px;text-align:center}
.pl-name{font-size:12px;color:var(--txt);flex:1}

.lineup-title{font-size:11px;font-weight:700;color:var(--g1);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid var(--g2)}

.odds-row{display:flex;gap:8px;margin-top:10px}

.odd-big-val{font-family:var(--mono);font-size:18px;font-weight:700}

.odd-big.od .odd-big-val{color:#b7750a}
.odd-big.oa .odd-big-val{color:var(--red)}

let selDate = fmt(today);
let selMatch = null;
let selTab = 'oracle';

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  document.getElementById('live-txt').textContent = t('liveCount');
  document.getElementById('sh-label').textContent = t('matches');
  renderAll();
}

function renderDates(){
  const bar = document.getElementById('dateBar');
  const matchDays = new Set(MATCHES.map(m=>m.date));
  bar.innerHTML = DAYS.map(d=>{
    const ds = fmt(d);
    const hasGame = matchDays.has(ds);
    return `<div class="date-chip ${ds===selDate?'active':''} ${hasGame?'':'dim'}" onclick="selDate='${ds}';renderAll()" style="${!hasGame?'opacity:.45':''}">
      <span class="dc-day">${dayName(d,lang)}</span>
      ${dayNum(d)}
    </div>`;
  }).join('');
}

function renderMatches(){
  const list = document.getElementById('matchList');
  const day = MATCHES.filter(m=>m.date===selDate);
  if(!day.length){list.innerHTML=`<div style="text-align:center;padding:24px 0;color:var(--txt3);font-size:13px">${lang==='az'?'Bu tarixdə oyun yoxdur':'No matches on this date'}</div>`;return}
  list.innerHTML = day.map(m=>{
    const aiPick = m.ai.home>m.ai.away ? m.home.short : m.away.short;
    return `<div class="match-card ${selMatch===m.id?'active':''}" onclick="openMatch(${m.id})">
      <div class="mc-top">
        <span class="mc-league">${m.league[lang]}</span>
        <span class="mc-time ${m.live?'live-t':''}">${m.live?'&#9679; ':''} ${m.time}</span>
      </div>
      <div class="mc-body">
        <div class="mc-team">
          <div class="mc-team-name">${m.home.name[lang]}</div>
          <div class="mc-team-form">${m.home.form.map(f=>`<div class="ff ${f}">${f}</div>`).join('')}</div>
        </div>
        <div class="mc-score-box">
          ${m.score ? `<div class="mc-score">${m.score}</div>${m.live?`<div class="mc-live-ind">${t('live')} ${m.time}</div>`:''}`:`<div class="mc-vs">vs</div>`}
        </div>
        <div class="mc-team">
          <div class="mc-team-name">${m.away.name[lang]}</div>
          <div class="mc-team-form">${m.away.form.map(f=>`<div class="ff ${f}">${f}</div>`).join('')}</div>
        </div>
      </div>
      <div class="mc-footer">
        <div class="mc-odds">
          <span class="odd-chip">1: ${m.odds.h}</span>
          <span class="odd-chip">X: ${m.odds.d}</span>
          <span class="odd-chip">2: ${m.odds.a}</span>
        </div>
        <div class="mc-ai-badge"><i class="ti ti-brain" aria-hidden="true"></i>AI: ${aiPick}</div>
      </div>
    </div>`;
  }).join('');
}

function openMatch(id){
  if(selMatch===id){selMatch=null;document.getElementById('detailPanel').style.display='none';renderMatches();return}
  selMatch=id;selTab='oracle';
  renderMatches();
  renderDetail();
  document.getElementById('detailPanel').style.display='block';
}

function renderDetail(){
  const m = MATCHES.find(x=>x.id===selMatch);
  if(!m) return;
  const tabs = [
    {k:'oracle',label:lang==='az'?'AI Orakul':'AI Oracle',icon:'ti-brain'},
    {k:'stats',label:lang==='az'?'Statistika':'Stats',icon:'ti-chart-bar'},
    {k:'lineups',label:lang==='az'?'Heyətlər':'Lineups',icon:'ti-list'},
    {k:'injuries',label:lang==='az'?'Zədələr':'Injuries',icon:'ti-first-aid-kit'},
  ];
  const dp = document.getElementById('detailPanel');
  dp.innerHTML = `<div class="detail-panel">
    <div class="dtabs">${tabs.map(tb=>`<div class="dtab ${selTab===tb.k?'active':''}" onclick="switchDTab('${tb.k}')">${tb.label}</div>`).join('')}</div>
    <div class="dp-body" id="dpBody"></div>
  </div>`;
  renderTabContent(m);
}

function switchDTab(k){selTab=k;const m=MATCHES.find(x=>x.id===selMatch);if(m){document.querySelectorAll('.dtab').forEach((d,i)=>{const ks=['oracle','stats','lineups','injuries'];d.classList.toggle('active',ks[i]===k)});renderTabContent(m)}}

function renderTabContent(m){
  const body = document.getElementById('dpBody');
  if(!body) return;
  if(selTab==='oracle') body.innerHTML = oracleHTML(m);
  else if(selTab==='stats') body.innerHTML = statsHTML(m);
  else if(selTab==='lineups') body.innerHTML = lineupsHTML(m);
  else body.innerHTML = injuriesHTML(m);
}

function oracleHTML(m){
  const confLabel = m.ai.conf==='high' ? t('highConf') : t('medConf');
  const stars = m.ai.conf==='high' ? '★★★★★' : '★★★☆☆';
  const hvotes = m.models.filter(x=>x.vote==='H').length;
  const dvotes = m.models.filter(x=>x.vote==='D').length;
  const avotes = m.models.filter(x=>x.vote==='A').length;
  return `<div>
    <div class="oracle-title"><i class="ti ti-brain" aria-hidden="true"></i>${t('oracle')}</div>
    <div class="oracle-sub">${t('aiModels')} — ${m.models.length} ${lang==='az'?'model':'models'}</div>
    <div class="conf-badge" style="color:#1a7a3c">${stars} ${confLabel}</div>
    <div class="prob-track">
      <div class="prob-seg ph" style="flex:${m.ai.home}">${m.ai.home}%</div>
      <div class="prob-seg pd" style="flex:${m.ai.draw}">${m.ai.draw}%</div>
      <div class="prob-seg pa" style="flex:${m.ai.away}">${m.ai.away}%</div>
    </div>
    <div class="prob-lbls">
      <div class="pl ph"><span class="pl-pct">${m.ai.home}%</span>${m.home.short}</div>
      <div class="pl pd"><span class="pl-pct">${m.ai.draw}%</span>${lang==='az'?'Bərabər':'Draw'}</div>
      <div class="pl pa"><span class="pl-pct">${m.ai.away}%</span>${m.away.short}</div>
    </div>
    <div class="analysis-box">
      <div class="analysis-lbl">${t('analysis')}</div>
      <div class="analysis-txt">${m.analysis[lang]}</div>
    </div>
    <div style="font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px">${t('models')}</div>
    <div class="models-row">${m.models.map(md=>`<div class="model-chip">${md.name}<span class="model-vote vote-${md.vote}">${md.vote==='H'?m.home.short:md.vote==='A'?m.away.short:(lang==='az'?'BƏR':'DRW')}</span></div>`).join('')}</div>
    <div class="odds-row">
      <div class="odd-big oh"><div class="odd-big-lbl">${m.home.short}</div><div class="odd-big-val">${m.odds.h}</div></div>
      <div class="odd-big od"><div class="odd-big-lbl">${lang==='az'?'Bərabər':'Draw'}</div><div class="odd-big-val">${m.odds.d}</div></div>
      <div class="odd-big oa"><div class="odd-big-lbl">${m.away.short}</div><div class="odd-big-val">${m.odds.a}</div></div>
    </div>
  </div>`;
}

function statsHTML(m){
  function formPts(form){return form.filter(x=>x==='W').length*3+form.filter(x=>x==='D').length}
  function bar(pts,col){return `<div class="pts-row"><div class="pts-trk"><div class="pts-fill" style="width:${Math.round(pts/15*100)}%;background:${col}"></div></div><div class="pts-lbl" style="color:${col}">${pts}/15</div></div>`}
  const hPts=formPts(m.home.form),aPts=formPts(m.away.form);
  const hCol=hPts>10?'#1a7a3c':hPts>6?'#b7750a':'#c0392b';
  const aCol=aPts>10?'#1a7a3c':aPts>6?'#b7750a':'#c0392b';
  function statRows(stats,col){return stats.map(s=>`<div class="stat-r"><div class="stat-lbl">${t(s.k)}</div><div class="stat-bw"><div class="stat-bf" style="width:${s.p}%;background:${col}"></div></div><div class="stat-val" style="color:${col}">${s.v}</div></div>`).join('')}
  return `<div>
    <div class="form-lbl">${t('form')}</div>
    <div class="form-row"><div class="form-name">${m.home.short}</div><div class="form-dots">${m.home.form.map(f=>`<div class="fd2 ${f}">${f}</div>`).join('')}</div></div>
    ${bar(hPts,hCol)}
    <div class="form-row"><div class="form-name">${m.away.short}</div><div class="form-dots">${m.away.form.map(f=>`<div class="fd2 ${f}">${f}</div>`).join('')}</div></div>
    ${bar(aPts,aCol)}
    <div class="stat-section-title">${t('homePerf')} — ${m.home.short}</div>
    ${statRows(m.homeStats,'#1a7a3c')}
    <div class="stat-section-title">${t('awayPerf')} — ${m.away.short}</div>
    ${statRows(m.awayStats,'#2980b9')}
  </div>`;
}

function lineupsHTML(m){
  function playerList(lineup){return lineup.map(p=>`<div class="player-r"><div class="pl-num">${p.n}</div><div class="pl-name">${p.nm}${p.cap?' <span class="pl-cap">©</span>':''}</div><div class="pl-pos">${p.p}</div></div>`).join('')}
  return `<div>
    <div class="lineup-title">${m.home.name[lang]}</div>
    ${playerList(m.homeLineup)}
    <div class="lineup-sub">
      <div class="lineup-title">${m.away.name[lang]}</div>
      ${playerList(m.awayLineup)}
    </div>
  </div>`;
}

function injuriesHTML(m){
  function injList(list,teamName){
    if(!list.length) return `<div style="font-size:12px;color:var(--txt3);padding:8px 0">${lang==='az'?'Yoxluq bildirimi yoxdur':'No reported absences'}</div>`;
    return list.map(p=>`<div class="inj-item ${p.lvl}"><div style="flex:1"><div class="inj-name">${p.nm}</div><span class="inj-pos">${p.pos[lang]}</span></div><span class="inj-badge ${p.lvl}">${p.type[lang]}</span></div>`).join('');
  }
  return `<div class="inj-list">
    <div class="inj-section">${m.home.name[lang]}</div>
    ${injList(m.injuries.home,m.home.name[lang])}
    <div class="inj-section">${m.away.name[lang]}</div>
    ${injList(m.injuries.away,m.away.name[lang])}
  </div>`;
}

function renderAll(){renderDates();renderMatches();if(selMatch)renderDetail()}
renderAll();
</script>
