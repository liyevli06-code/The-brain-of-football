let selDate=fmt(today);
let selMatch=null;
let selTab='oracle';

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  document.getElementById('seasonTxt').textContent=t('seasonEnd');
  document.getElementById('sh-label').textContent=t('sectionLabel');
  renderAll();
}

function renderDates(){
  const bar=document.getElementById('dateBar');
  const matchDays=new Set(MATCHES.map(m=>m.date));
  bar.innerHTML=DAYS.map(d=>{
    const ds=fmt(d);const has=matchDays.has(ds);
    return `<div class="date-chip ${ds===selDate?'active':''} ${has?'has-match':''}" onclick="selDate='${ds}';selMatch=null;document.getElementById('detailPanel').style.display='none';renderAll()" style="${!has&&ds!==selDate?'opacity:.4':''}">
      <span class="dc-day">${dayNameShort(d,lang)}</span>${dayNum(d)}
    </div>`;
  }).join('');
}

function leagueBadgeClass(type){return type==='friendly'?'friendly-badge':type==='intl'?'intl-badge':''}

function renderMatches(){
  const list=document.getElementById('matchList');
  const day=MATCHES.filter(m=>m.date===selDate);
  if(!day.length){
    list.innerHTML=`<div class="empty-day"><i class="ti ti-calendar-off" aria-hidden="true"></i><p>${t('noMatch')}</p><small>${t('noMatchSub')}</small></div>`;
    return;
  }
  list.innerHTML=day.map(m=>{
    const hn=m.home.name[lang];const an=m.away.name[lang];
    const aiPick=m.ai?(m.ai.home>m.ai.away?m.home.short:m.away.short):null;
    const typeLabel=t(m.type);
    return `<div class="match-card ${selMatch===m.id?'active':''} ${m.type==='friendly'?'friendly':''}" onclick="openMatch(${m.id})">
      <div class="mc-top">
        <span class="mc-league ${leagueBadgeClass(m.type)}">${m.league[lang]}</span>
        <span class="mc-time">${m.time}</span>
      </div>
      <div class="mc-body">
        <div class="mc-team">
          <div class="mc-team-name">${hn}</div>
          <div class="mc-team-form">${m.home.form.map(f=>`<div class="ff ${f}">${f}</div>`).join('')}</div>
        </div>
        <div class="mc-score-box"><div class="mc-vs">vs</div></div>
        <div class="mc-team">
          <div class="mc-team-name">${an}</div>
          <div class="mc-team-form">${m.away.form.map(f=>`<div class="ff ${f}">${f}</div>`).join('')}</div>
        </div>
      </div>
      <div class="mc-footer">
        ${m.odds?`<div class="mc-odds"><span class="odd-chip">1:${m.odds.h}</span><span class="odd-chip">X:${m.odds.d}</span><span class="odd-chip">2:${m.odds.a}</span></div>`:`<span class="no-odds">${t('noOdds')}</span>`}
        ${aiPick?`<div class="mc-ai-badge"><i class="ti ti-brain" aria-hidden="true"></i>AI:${aiPick}</div>`:`<div class="mc-ai-badge" style="background:#f5f5f5;color:#888;border-color:#ddd"><i class="ti ti-minus" aria-hidden="true"></i>${typeLabel}</div>`}
      </div>
    </div>`;
  }).join('');
}

function openMatch(id){
  if(selMatch===id){selMatch=null;document.getElementById('detailPanel').style.display='none';renderMatches();return}
  selMatch=id;selTab='oracle';
  renderMatches();renderDetail();
  document.getElementById('detailPanel').style.display='block';
}

function renderDetail(){
  const m=MATCHES.find(x=>x.id===selMatch);
  if(!m)return;
  const tabs=[
    {k:'oracle',label:t('aiTab'),icon:'ti-brain'},
    {k:'stats',label:t('statsTab'),icon:'ti-chart-bar'},
    {k:'lineups',label:t('lineupsTab'),icon:'ti-list'},
    {k:'injuries',label:t('injTab'),icon:'ti-first-aid-kit'},
  ];
  document.getElementById('detailPanel').innerHTML=`<div class="detail-panel">
    <div class="dtabs">${tabs.map(tb=>`<div class="dtab ${selTab===tb.k?'active':''}" onclick="switchDTab('${tb.k}')">${tb.label}</div>`).join('')}</div>
    <div class="dp-body" id="dpBody"></div>
  </div>`;
  renderTabContent(m);
}

function switchDTab(k){
  selTab=k;
  const m=MATCHES.find(x=>x.id===selMatch);
  if(!m)return;
  document.querySelectorAll('.dtab').forEach((d,i)=>{
    const ks=['oracle','stats','lineups','injuries'];
    d.classList.toggle('active',ks[i]===k);
  });
  renderTabContent(m);
}

function renderTabContent(m){
  const body=document.getElementById('dpBody');
  if(!body)return;
  if(selTab==='oracle')body.innerHTML=oracleHTML(m);
  else if(selTab==='stats')body.innerHTML=statsHTML(m);
  else if(selTab==='lineups')body.innerHTML=lineupsHTML(m);
  else body.innerHTML=injuriesHTML(m);
}

function oracleHTML(m){
  if(!m.ai){
    return `<div class="friendly-note"><i class="ti ti-info-circle" aria-hidden="true"></i><div><strong>${t('noPred')}</strong><p style="margin-top:4px;font-size:11px">${t('noPredSub')}</p></div></div>`;
  }
  const confLabel=m.ai.conf==='high'?t('highConf'):t('medConf');
  const stars=m.ai.conf==='high'?'★★★★★':'★★★☆☆';
  return `<div>
    <div class="oracle-title"><i class="ti ti-brain" aria-hidden="true"></i>${t('oracle')}</div>
    <div class="oracle-sub">${t('aiSub')} — ${m.models?m.models.length:0} ${lang==='az'?'model':'models'}</div>
    <div class="conf-badge">${stars} ${confLabel}</div>
    <div class="prob-track">
      <div class="prob-seg ph" style="flex:${m.ai.home}">${m.ai.home}%</div>
      <div class="prob-seg pd" style="flex:${m.ai.draw}">${m.ai.draw}%</div>
      <div class="prob-seg pa" style="flex:${m.ai.away}">${m.ai.away}%</div>
    </div>
    <div class="prob-lbls">
      <div class="pl ph"><span class="pl-pct">${m.ai.home}%</span>${m.home.short}</div>
      <div class="pl pd"><span class="pl-pct">${m.ai.draw}%</span>${lang==='az'?'Bərabər':'Draw'}</div>
      <div class="pl pa"><span class="pl-pct">${m.ai.away}%</span>${m.away.short}</div>
    </div>
    <div class="analysis-box">
      <div class="analysis-lbl">${t('analysis')}</div>
      <div class="analysis-txt">${m.analysis[lang]}</div>
    </div>
    ${m.models?`<div style="font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px">${t('models')}</div>
    <div class="models-row">${m.models.map(md=>`<div class="model-chip">${md.name}<span class="model-vote vote-${md.vote}">${md.vote==='H'?m.home.short:md.vote==='A'?m.away.short:(lang==='az'?'BƏR':'DRW')}</span></div>`).join('')}</div>`:''}
    ${m.odds?`<div class="odds-row">
      <div class="odd-big oh"><div class="odd-big-lbl">${m.home.short}</div><div class="odd-big-val">${m.odds.h}</div></div>
      <div class="odd-big od"><div class="odd-big-lbl">${lang==='az'?'Bərabər':'Draw'}</div><div class="odd-big-val">${m.odds.d}</div></div>
      <div class="odd-big oa"><div class="odd-big-lbl">${m.away.short}</div><div class="odd-big-val">${m.odds.a}</div></div>
    </div>`:''}
  </div>`;
}

function statsHTML(m){
  function formPts(form){return form.filter(x=>x==='W').length*3+form.filter(x=>x==='D').length}
  function pBar(pts,col){return `<div class="pts-row"><div class="pts-trk"><div class="pts-fill" style="width:${Math.round(pts/15*100)}%;background:${col}"></div></div><div class="pts-lbl" style="color:${col}">${pts}/15</div></div>`}
  const hPts=formPts(m.home.form),aPts=formPts(m.away.form);
  const hCol=hPts>10?'#1a7a3c':hPts>6?'#b7750a':'#c0392b';
  const aCol=aPts>10?'#1a7a3c':aPts>6?'#b7750a':'#c0392b';
  const statK=['avgGoals','possession','xg','cs'];
  function sRows(stats,col){
    if(!stats)return`<p style="font-size:12px;color:var(--txt3);padding:8px 0">${lang==='az'?'Statistika mövcud deyil':'Stats not available'}</p>`;
    return stats.map(s=>`<div class="stat-r"><div class="stat-lbl">${t(s.k)}</div><div class="stat-bw"><div class="stat-bf" style="width:${s.p}%;background:${col}"></div></div><div class="stat-val" style="color:${col}">${s.v}</div></div>`).join('');
  }
  return `<div>
    <div class="form-lbl">${t('form')}</div>
    <div class="form-row"><div class="form-name">${m.home.short}</div><div class="form-dots">${m.home.form.map(f=>`<div class="fd2 ${f}">${f}</div>`).join('')}</div></div>
    ${pBar(hPts,hCol)}
    <div class="form-row"><div class="form-name">${m.away.short}</div><div class="form-dots">${m.away.form.map(f=>`<div class="fd2 ${f}">${f}</div>`).join('')}</div></div>
    ${pBar(aPts,aCol)}
    <div class="stat-section-title">${t('homePerf')} — ${m.home.short}</div>
    ${sRows(m.homeStats,'#1a7a3c')}
    <div class="stat-section-title">${t('awayPerf')} — ${m.away.short}</div>
    ${sRows(m.awayStats,'#2980b9')}
  </div>`;
}

function lineupsHTML(m){
  const pl=lineup=>`<div class="lineup-title">${m[lineup==='home'?'home':'away'].name[lang]}</div>${m[lineup+'Lineup'].map(p=>`<div class="player-r"><div class="pl-num">${p.n}</div><div class="pl-name">${p.nm}${p.cap?' <span class="pl-cap">©</span>':''}</div><div class="pl-pos">${p.p}</div></div>`).join('')}`;
  return `<div>${pl('home')}<div class="lineup-sub">${pl('away')}</div></div>`;
}

function injuriesHTML(m){
  function injList(list){
    if(!list||!list.length)return`<div style="font-size:12px;color:var(--txt3);padding:6px 0">${t('noAbsence')}</div>`;
    return list.map(p=>`<div class="inj-item ${p.lvl}"><div style="flex:1"><div class="inj-name">${p.nm}</div><span class="inj-pos">${p.pos[lang]}</span></div><span class="inj-badge ${p.lvl}">${p.type[lang]}</span></div>`).join('');
  }
  return `<div class="inj-list">
    <div class="inj-section">${m.home.name[lang]}</div>${injList(m.injuries.home)}
    <div class="inj-section">${m.away.name[lang]}</div>${injList(m.injuries.away)}
  </div>`;
}

function renderAll(){renderDates();renderMatches();if(selMatch)renderDetail()}
renderAll();
</script>
